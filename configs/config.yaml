dataset:
  root: data/splits
  format: coco
  val_split: 0.15
  test_split: 0.10
  seed: 42

model:
  architecture: yolov8m
  pretrained: true

train:
  epochs: 100
  imgsz: 640
  batch: 4
  device: cpu
  workers: 2
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  patience: 20
  save_period: 10
  project: runs/train
  name: kamali_det

augmentation:
  mosaic: 1.0
  mixup: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  flipud: 0.0
  fliplr: 0.5
  degrees: 0.0
  translate: 0.1
  scale: 0.5

inference:
  conf: 0.25
  iou: 0.45
  imgsz: 640
  max_det: 300
